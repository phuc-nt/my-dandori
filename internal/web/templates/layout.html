<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dandori Console</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script defer src="/static/app.js"></script>
  <style>/* fallback when CDN is unreachable */
    body{font-family:system-ui,sans-serif}
    table{border-collapse:collapse}
    .fallback td,.fallback th{border:1px solid #ddd;padding:4px 8px}
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
<nav class="bg-slate-900 text-white px-4 py-2 flex items-center gap-4 flex-wrap">
  <a href="/" class="font-bold text-lg">⛩ Dandori</a>
  <a href="/" class="hover:underline">Standup</a>
  <a href="/dash/org" class="hover:underline">Org</a>
  <a href="/runs" class="hover:underline">Runs</a>
  <a href="/reviews" class="hover:underline">Reviews</a>
  <a href="/budgets" class="hover:underline">Budgets</a>
  <a href="/provenance" class="hover:underline">Provenance</a>
  <a href="/rules" class="hover:underline">Rules</a>
  <span class="flex-1"></span>
  {{if .KillOn}}
  <form method="post" action="/api/kill" onsubmit="return confirm('Lift the global kill switch?')">
    <input type="hidden" name="on" value="0">
    <button class="bg-red-700 animate-pulse px-3 py-1 rounded font-bold">KILL SWITCH ON — lift</button>
  </form>
  {{else}}
  <form method="post" action="/api/kill" onsubmit="return confirm('Engage GLOBAL kill switch? Every agent tool call will be denied.')">
    <input type="hidden" name="on" value="1">
    <button class="bg-red-600 hover:bg-red-500 px-3 py-1 rounded font-semibold">⏻ Kill switch</button>
  </form>
  {{end}}
</nav>
<main class="max-w-7xl mx-auto p-4">
  {{template "content" .}}
</main>
</body>
</html>
