{{define "content"}}
<h1 class="text-2xl font-bold mb-4">Runs</h1>
{{template "saved_views" .}}
<form class="flex gap-2 mb-4 flex-wrap"
      hx-get="/runs" hx-target="#runs-tbody" hx-swap="outerHTML" hx-trigger="change, submit">
  <input name="agent" placeholder="agent" value="{{.Q.Get "agent"}}" class="border rounded px-2 py-1 text-sm">
  <input name="project" placeholder="project" value="{{.Q.Get "project"}}" class="border rounded px-2 py-1 text-sm">
  <select name="status" class="border rounded px-2 py-1 text-sm">
    <option value="">any status</option>
    {{range $s := (list "running" "done" "failed" "killed")}}
    <option value="{{$s}}" {{if eq ($.Q.Get "status") $s}}selected{{end}}>{{$s}}</option>
    {{end}}
  </select>
  <button class="bg-slate-600 text-white px-3 py-1 rounded text-sm">Filter</button>
</form>
<form id="bulk-form">
<!-- Bulk action bar (UA6): select rows → kill / set-budget, each audited -->
<div class="flex items-center gap-2 mb-2 text-sm">
  <button hx-post="/runs/bulk-kill" hx-include="#bulk-form" hx-target="#bulk-result" hx-swap="innerHTML"
          hx-confirm="Dừng các run đã chọn?"
          class="bg-red-600 text-white px-3 py-1 rounded">Dừng các run đã chọn</button>
  <input name="amount" type="number" step="0.01" min="0" placeholder="$ ngân sách"
         class="border rounded px-2 py-1 w-32">
  <button hx-post="/runs/bulk-budget" hx-include="#bulk-form" hx-target="#bulk-result" hx-swap="innerHTML"
          class="bg-slate-600 text-white px-3 py-1 rounded">Đặt ngân sách (theo agent)</button>
  <div id="bulk-result" class="flex-1"></div>
</div>
<div class="bg-white border rounded-lg overflow-hidden">
<table class="w-full text-sm">
  <thead class="bg-gray-100 text-left"><tr>
    <th class="p-2"><input type="checkbox" onchange="document.querySelectorAll('input[name=run_ids]').forEach(function(x){x.checked=this.checked}.bind(this))"></th>
    <th class="p-2">Run</th><th class="p-2">Agent</th><th class="p-2">Project</th><th class="p-2">Task</th>
    <th class="p-2">Status</th><th class="p-2 text-right">Cost</th><th class="p-2">Started</th><th class="p-2">Src</th>
  </tr></thead>
  {{template "runs_tbody" .}}
</table>
</div>
</form>

<div class="flex items-center gap-3 mt-3 text-sm">
  {{if gt .PageNum 0}}<a class="text-blue-600 hover:underline" href="/runs?page={{.PrevPage}}&agent={{.Q.Get "agent"}}&project={{.Q.Get "project"}}&status={{.Q.Get "status"}}">← Prev</a>{{end}}
  <span class="text-gray-400">page {{.PageNum}}</span>
  {{if .HasNext}}<a class="text-blue-600 hover:underline" href="/runs?page={{.NextPage}}&agent={{.Q.Get "agent"}}&project={{.Q.Get "project"}}&status={{.Q.Get "status"}}">Next →</a>{{end}}
  <span class="flex-1"></span>
  <span class="text-gray-400">Compare: mở <code>/runs/compare?ids=id1,id2</code> hoặc click 2 run rồi ghép id.</span>
</div>
{{end}}
